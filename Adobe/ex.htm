<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
/* General Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  height: 100%;
  font-family: 'Poppins', sans-serif;
  background-color: #111;
  color: white;
}

header {
  text-align: center;
  padding: 2rem;
  font-size: 2rem;
  background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
  animation: fadeInDown 1s ease-out;
}

/* Gallery Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  grid-auto-rows: 200px;
  gap: 1rem;
  padding: 1rem;
}

/* Different Sizes */
.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}

/* Hover zoom effect */
.gallery-item:hover img {
  transform: scale(1.1);
}

/* Different item sizes */
.gallery-item.large {
  grid-column: span 2;
  grid-row: span 2;
}

.gallery-item.tall {
  grid-row: span 2;
}

.gallery-item.wide {
  grid-column: span 2;
}

/* Responsive Behavior */
@media (min-width: 0px) {
  .gallery {
    grid-template-columns: repeat(1, 1fr);
  }
}
@media (min-width: 600px) {
  .gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}
@media (min-width: 900px) {
  .gallery {
    grid-template-columns: repeat(3, 1fr);
  }
}
@media (min-width: 1200px) {
  .gallery {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* Overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 100%;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 1000;
}

.overlay.show {
  opacity: 1;
  pointer-events: all;
}

.overlay-content {
  background: white;
  color: black;
  padding: 2rem;
  border-radius: 12px;
  text-align: center;
  animation: zoomIn 0.5s;
}

#like-button, #close-button {
  margin: 1rem;
  padding: 0.7rem 1.5rem;
  border: none;
  background: #2575fc;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s;
}

#like-button:hover, #close-button:hover {
  background: #6a11cb;
}

/* Animations */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes zoomIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}


    </style>
</head>
<body>
    <header>
        <h1>Find inspiration in the gallery</h1>
      </header>
      
      <main class="gallery">
        <div class="gallery-item large" data-name="Tiger">
          <img src="1.webp" alt="Tiger">
        </div>
        <div class="gallery-item" data-name="Forest">
          <img src="2.webp" alt="Forest">
        </div>
        <div class="gallery-item tall" data-name="Mushroom Table">
          <img src="4.webp" alt="Mushroom">
        </div>
        <div class="gallery-item wide" data-name="Fantasy Knight">
          <img src="logo.png" alt="Knight">
        </div>
        <div class="gallery-item" data-name="Butterflies">
          <img src="1.webp" alt="Butterfly">
        </div>
      </main>
      
      <!-- Overlay Modal -->
      <div class="overlay" id="overlay">
        <div class="overlay-content">
          <h2 id="image-name"></h2>
          <button id="like-button">❤️ Like</button>
          <button id="close-button">Close</button>
        </div>
      </div>
</body>
<script>
const galleryItems = document.querySelectorAll('.gallery-item');
const overlay = document.getElementById('overlay');
const imageName = document.getElementById('image-name');
const likeButton = document.getElementById('like-button');
const closeButton = document.getElementById('close-button');

galleryItems.forEach(item => {
  item.addEventListener('click', () => {
    const name = item.getAttribute('data-name');
    imageName.textContent = name;
    overlay.classList.add('show');
  });
});

closeButton.addEventListener('click', () => {
  overlay.classList.remove('show');
});

likeButton.addEventListener('click', () => {
  likeButton.textContent = "❤️ Liked!";
  likeButton.style.backgroundColor = "#6a11cb";
});

</script>
</html>
